version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: blog-posts-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: .
    container_name: blog-posts-server
    ports:
      - "4000:4000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/blog-posts
      - JWT_SECRET=${JWT_SECRET:-supersecretkey_change_me_in_production}
    depends_on:
      - mongodb
    restart: on-failure

volumes:
  mongo-data:
